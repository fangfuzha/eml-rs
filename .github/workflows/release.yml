name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v* tag to publish or refresh
        type: string
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  validate-release-tag:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
    steps:
      - name: Resolve release tag
        id: resolve
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+(\.[0-9]+)*([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like v0.1.2, got: $RELEASE_TAG" >&2
            exit 1
          fi

          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
      - name: Verify tag exists
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.resolve.outputs.release_tag }}
        run: gh api "repos/${{ github.repository }}/git/ref/tags/${RELEASE_TAG}" >/dev/null

  build-release:
    needs: validate-release-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_suffix: ubuntu-latest
          - os: windows-latest
            asset_suffix: windows-latest
          - os: macos-latest
            asset_suffix: macos-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-release-tag.outputs.release_tag }}
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --all-targets
      - name: Build release artifacts
        run: cargo build --release
      - name: Package release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $dist = Join-Path $PWD "dist"
          $stage = Join-Path $env:RUNNER_TEMP "eml-rs-release"
          if (Test-Path $dist) {
            Remove-Item -LiteralPath $dist -Recurse -Force
          }
          if (Test-Path $stage) {
            Remove-Item -LiteralPath $stage -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path (Join-Path $stage "include") | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $stage "target/release") | Out-Null
          New-Item -ItemType Directory -Force -Path $dist | Out-Null

          Copy-Item -LiteralPath "include/eml_rs.h" -Destination (Join-Path $stage "include/eml_rs.h")
          Get-ChildItem -Path "target/release" -File |
            Where-Object { $_.Name -like "*eml_rs*" } |
            Copy-Item -Destination (Join-Path $stage "target/release")

          $examples = Join-Path $PWD "target/release/examples"
          if (Test-Path $examples) {
            Copy-Item -LiteralPath $examples -Destination (Join-Path $stage "target/release/examples") -Recurse
          }

          Compress-Archive -Path (Join-Path $stage "*") -DestinationPath (Join-Path $dist "eml-rs-${{ needs.validate-release-tag.outputs.release_tag }}-${{ matrix.asset_suffix }}.zip") -Force
      - name: Upload packaged assets
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ matrix.asset_suffix }}
          path: dist/eml-rs-${{ needs.validate-release-tag.outputs.release_tag }}-${{ matrix.asset_suffix }}.zip
          if-no-files-found: error

  publish-release:
    needs:
      - validate-release-tag
      - build-release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-release-tag.outputs.release_tag }}
      - name: Download packaged assets
        uses: actions/download-artifact@v8
        with:
          pattern: release-assets-*
          path: dist
          merge-multiple: true
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.validate-release-tag.outputs.release_tag }}
        run: |
          set -euo pipefail

          notes="docs/releases/${TAG_NAME}/release-notes.md"
          if [ ! -f "$notes" ]; then
            echo "Missing release notes file: $notes" >&2
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --title "eml-rs ${TAG_NAME}" --notes-file "$notes"
            gh release upload "$TAG_NAME" dist/*.zip --clobber
          else
            gh release create "$TAG_NAME" dist/*.zip --title "eml-rs ${TAG_NAME}" --notes-file "$notes" --verify-tag
          fi
