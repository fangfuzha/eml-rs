name: ci

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      matrix_required: ${{ steps.filter.outputs.matrix_required }}
      coverage_required: ${{ steps.filter.outputs.coverage_required }}
      supply_chain_required: ${{ steps.filter.outputs.supply_chain_required }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect matrix-relevant changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            matrix_required:
              - "Cargo.toml"
              - "Cargo.lock"
              - ".github/workflows/**"
              - "benchmarks/**"
              - "benches/**"
              - "crates/**"
              - "examples/**"
              - "fuzz/**"
              - "include/**"
              - "scripts/**"
              - "src/**"
              - "tests/**"
            coverage_required:
              - "Cargo.toml"
              - "Cargo.lock"
              - ".github/workflows/**"
              - "benchmarks/**"
              - "benches/**"
              - "crates/**"
              - "examples/**"
              - "include/**"
              - "scripts/**"
              - "src/**"
              - "tests/**"
            supply_chain_required:
              - "Cargo.lock"
              - "Cargo.toml"
              - "**/Cargo.toml"
              - ".cargo/**"
              - ".github/workflows/**"
              - "deny.toml"

  test:
    needs: changes
    if: needs.changes.outputs.matrix_required == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Check all targets
        run: cargo check --all-targets
      - name: Run tests
        run: cargo test --all-targets

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt -- --check
      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

  no_std:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Add no_std target
        run: rustup target add thumbv7em-none-eabihf
      - name: Check no_std core crate
        run: cargo check -p eml-core --target thumbv7em-none-eabihf

  coverage:
    needs: changes
    if: needs.changes.outputs.coverage_required == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Enforce coverage thresholds
        run: cargo llvm-cov --workspace --all-features --all-targets --summary-only --fail-under-lines 80 --fail-under-regions 70

  compat:
    needs: changes
    if: needs.changes.outputs.matrix_required == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: ["1.86.0", stable]
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          targets: ${{ matrix.target }}
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Check workspace on target
        run: cargo check --workspace --all-targets --target ${{ matrix.target }}

  supply-chain:
    needs: changes
    if: needs.changes.outputs.supply_chain_required == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit
      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny
      - name: Run cargo audit
        run: cargo audit
      - name: Run cargo deny
        run: cargo deny check licenses bans
