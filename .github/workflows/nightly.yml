name: nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      target:
        description: Which nightly workload to run
        type: choice
        required: true
        default: all
        options:
          - all
          - bench-only

concurrency:
  group: nightly-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target || github.ref }}
  cancel-in-progress: true

jobs:
  nightly-quality:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-fuzz
        uses: taiki-e/install-action@cargo-fuzz
      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit
      - name: Run tests
        run: cargo test --all-targets
      - name: Run cargo audit
        run: cargo audit
      - name: Fuzz parser/lowering path
        run: cargo fuzz run parse_lower_eval -- -max_total_time=60
      - name: Fuzz backend consistency
        run: cargo fuzz run expr_eval_consistency -- -max_total_time=60
      - name: Fuzz autodiff/simplify path
        run: cargo fuzz run autodiff_simplify -- -max_total_time=60

  nightly-bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Run benchmarks
        run: cargo bench --bench eval_bench
      - name: Benchmark regression gate
        run: python3 scripts/bench_gate.py --criterion-dir target/criterion --config benchmarks/gate.json
      - name: Ensure release build for C ABI path
        run: cargo build --release -q
