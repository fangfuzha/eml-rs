name: nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      target:
        description: Which nightly workload to run
        type: choice
        required: true
        default: all
        options:
          - all
          - bench-only
          - parallel-bench-only
          - quality-only
          - metrics-only
          - paper-reproduction-only
          - sr-research-only

permissions:
  actions: read
  contents: read

concurrency:
  group: nightly-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      quality_required: ${{ steps.detect.outputs.quality_required }}
      bench_required: ${{ steps.detect.outputs.bench_required }}
      parallel_bench_required: ${{ steps.detect.outputs.parallel_bench_required }}
      metrics_required: ${{ steps.detect.outputs.metrics_required }}
      paper_reproduction_required: ${{ steps.detect.outputs.paper_reproduction_required }}
      sr_research_required: ${{ steps.detect.outputs.sr_research_required }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect nightly-relevant changes
        id: detect
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          TARGET: ${{ github.event.inputs.target || 'all' }}
        run: |
          set -euo pipefail

          quality_patterns=(
            ".github/workflows/nightly.yml"
            "Cargo.toml"
            "Cargo.lock"
            "crates/"
            "examples/"
            "fuzz/"
            "include/"
            "src/"
            "tests/"
          )
          bench_patterns=(
            ".github/workflows/nightly.yml"
            "Cargo.toml"
            "Cargo.lock"
            "benchmarks/"
            "benches/"
            "crates/"
            "include/"
            "scripts/bench_gate.py"
            "src/"
          )
          metrics_patterns=(
            ".github/workflows/nightly.yml"
            "Cargo.toml"
            "Cargo.lock"
            "crates/"
            "examples/metrics_probe.rs"
            "examples/pipeline_api.rs"
            "scripts/collect_metrics.py"
            "src/"
          )
          paper_reproduction_patterns=(
            ".github/workflows/nightly.yml"
            "Cargo.toml"
            "Cargo.lock"
            "crates/"
            "docs/paper-basis-catalog.json"
            "docs/paper-basis-catalog.md"
            "scripts/paper_reproduction_summary.py"
            "src/"
            "tests/paper_reproduction.rs"
          )
          sr_research_patterns=(
            ".github/workflows/nightly.yml"
            "docs/eml-paper-summary.md"
            "docs/testing.md"
            "examples/symbolic_regression_loop.rs"
            "scripts/sr_research_benchmark.py"
          )

          set_required() {
            echo "quality_required=$1" >> "$GITHUB_OUTPUT"
            echo "bench_required=$2" >> "$GITHUB_OUTPUT"
            echo "metrics_required=$3" >> "$GITHUB_OUTPUT"
            echo "parallel_bench_required=$4" >> "$GITHUB_OUTPUT"
            echo "paper_reproduction_required=$5" >> "$GITHUB_OUTPUT"
            echo "sr_research_required=$6" >> "$GITHUB_OUTPUT"
            echo "quality_required=$1"
            echo "bench_required=$2"
            echo "metrics_required=$3"
            echo "parallel_bench_required=$4"
            echo "paper_reproduction_required=$5"
            echo "sr_research_required=$6"
          }

          matches_any() {
            local path="$1"
            shift
            local pattern
            for pattern in "$@"; do
              if [[ "$pattern" == */ ]]; then
                [[ "$path" == "$pattern"* ]] && return 0
              elif [[ "$path" == "$pattern" ]]; then
                return 0
              fi
            done
            return 1
          }

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            case "$TARGET" in
              bench-only) set_required false true false false false false ;;
              parallel-bench-only) set_required false false false true false false ;;
              quality-only) set_required true false false false false false ;;
              metrics-only) set_required false false true false false false ;;
              paper-reproduction-only) set_required false false false false true false ;;
              sr-research-only) set_required false false false false false true ;;
              *) set_required true true true true true true ;;
            esac
            exit 0
          fi

          current_sha="$(git rev-parse HEAD)"
          previous_sha="$(
            gh run list \
              --workflow nightly.yml \
              --branch "${GITHUB_REF_NAME:-main}" \
              --event schedule \
              --status success \
              --limit 1 \
              --json headSha \
              --jq '.[0].headSha // empty' || true
          )"

          if [[ -z "$previous_sha" ]]; then
            echo "No successful scheduled nightly run found; running all nightly jobs."
            set_required true true true false true true
            exit 0
          fi

          if [[ "$previous_sha" == "$current_sha" ]]; then
            echo "Current commit already had a successful scheduled nightly run."
            set_required false false false false false false
            exit 0
          fi

          if ! git cat-file -e "${previous_sha}^{commit}" 2>/dev/null; then
            git fetch --no-tags --depth=200 origin "$previous_sha" || true
          fi

          if ! git cat-file -e "${previous_sha}^{commit}" 2>/dev/null; then
            echo "Could not fetch previous successful nightly commit; running all nightly jobs."
            set_required true true true false true true
            exit 0
          fi

          mapfile -t changed_files < <(git diff --name-only "$previous_sha" "$current_sha")
          if [[ "${#changed_files[@]}" -eq 0 ]]; then
            echo "No changed files since previous successful scheduled nightly run."
            set_required false false false false false false
            exit 0
          fi

          quality_required=false
          bench_required=false
          metrics_required=false
          parallel_bench_required=false
          paper_reproduction_required=false
          sr_research_required=false
          echo "Changed files since $previous_sha:"
          for path in "${changed_files[@]}"; do
            echo "  $path"
            matches_any "$path" "${quality_patterns[@]}" && quality_required=true
            matches_any "$path" "${bench_patterns[@]}" && bench_required=true
            matches_any "$path" "${metrics_patterns[@]}" && metrics_required=true
            matches_any "$path" "${paper_reproduction_patterns[@]}" && paper_reproduction_required=true
            matches_any "$path" "${sr_research_patterns[@]}" && sr_research_required=true
          done

          set_required "$quality_required" "$bench_required" "$metrics_required" "$parallel_bench_required" "$paper_reproduction_required" "$sr_research_required"

  nightly-quality:
    needs: changes
    if: needs.changes.outputs.quality_required == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit
      - name: Run tests
        run: cargo test --all-targets
      - name: Run cargo audit
        run: cargo audit
      - name: Fuzz parser/lowering path
        run: cargo fuzz run parse_lower_eval --target x86_64-unknown-linux-gnu -- -max_total_time=60
      - name: Fuzz backend consistency
        run: cargo fuzz run expr_eval_consistency --target x86_64-unknown-linux-gnu -- -max_total_time=60
      - name: Fuzz autodiff/simplify path
        run: cargo fuzz run autodiff_simplify --target x86_64-unknown-linux-gnu -- -max_total_time=60

  nightly-bench:
    needs: changes
    if: needs.changes.outputs.bench_required == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Run benchmarks
        run: cargo bench --bench eval_bench
      - name: Benchmark regression gate
        run: python3 scripts/bench_gate.py --criterion-dir target/criterion --config benchmarks/gate.json
      - name: Ensure release build for C ABI path
        run: cargo build --release -q

  nightly-parallel-bench:
    needs: changes
    if: needs.changes.outputs.parallel_bench_required == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Run experimental parallel benchmarks
        run: cargo bench --bench parallel_bench
      - name: Summarize parallel benchmark results
        run: python3 scripts/parallel_bench_summary.py --criterion-dir target/criterion --output target/parallel-bench-summary.json --print-recommendation
      - name: Check parallel benchmark recommendation (non-blocking)
        continue-on-error: true
        run: python3 scripts/parallel_bench_summary.py --input-summary target/parallel-bench-summary.json --print-recommendation --require-keep-configured-default --require-default-mode auto
      - name: Upload parallel benchmark summary
        uses: actions/upload-artifact@v7
        with:
          name: nightly-parallel-bench-summary
          path: target/parallel-bench-summary.json
          if-no-files-found: error

  nightly-metrics:
    needs: changes
    if: needs.changes.outputs.metrics_required == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Collect lightweight metrics
        run: |
          python3 scripts/collect_metrics.py \
            --rss-nodes 100000 \
            --samples 4 \
            --cold-runs 3 \
            --require-rss \
            --output target/eml-metrics.json
      - name: Upload metrics report
        uses: actions/upload-artifact@v7
        with:
          name: nightly-metrics
          path: target/eml-metrics.json
          if-no-files-found: error

  nightly-paper-reproduction:
    needs: changes
    if: needs.changes.outputs.paper_reproduction_required == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Replay paper-basis witness harness
        run: cargo test --test paper_reproduction
      - name: Summarize paper reproduction assets
        run: |
          python3 scripts/paper_reproduction_summary.py \
            --output-json target/paper-reproduction-summary.json \
            --output-md target/paper-reproduction-summary.md
      - name: Upload paper reproduction summary
        uses: actions/upload-artifact@v7
        with:
          name: nightly-paper-reproduction-summary
          path: |
            target/paper-reproduction-summary.json
            target/paper-reproduction-summary.md
          if-no-files-found: error

  nightly-sr-research:
    needs: changes
    if: needs.changes.outputs.sr_research_required == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Run symbolic regression research benchmark
        run: |
          python3 scripts/sr_research_benchmark.py \
            --samples 41 \
            --steps 80 \
            --output-json target/sr-research-benchmark.json \
            --output-md target/sr-research-benchmark.md
      - name: Upload symbolic regression research summary
        uses: actions/upload-artifact@v7
        with:
          name: nightly-sr-research-summary
          path: |
            target/sr-research-benchmark.json
            target/sr-research-benchmark.md
          if-no-files-found: error
